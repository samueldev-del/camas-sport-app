<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Full bleed safe-zone background (CAMAS green) -->
  <rect width="512" height="512" fill="#2e7d32"/>
  <!-- Cameroon flag stripe at the bottom edge of safe zone -->
  <rect x="0" y="460" width="170.7" height="52" fill="#2e7d32"/>
  <rect x="170.7" y="460" width="170.6" height="52" fill="#d32f2f"/>
  <rect x="341.3" y="460" width="170.7" height="52" fill="#fdd835"/>
  <!-- Soccer ball (logo, in 80% safe zone = 256px diameter, centered) -->
  <circle cx="256" cy="232" r="128" fill="#ffffff" stroke="#fdd835" stroke-width="6"/>
  <polygon points="256,160 312,200 290,272 222,272 200,200" fill="#1a1a1a"/>
  <!-- stitches -->
  <line x1="256" y1="104" x2="256" y2="160" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  <line x1="368" y1="184" x2="312" y2="200" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  <line x1="338" y1="328" x2="290" y2="272" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  <line x1="174" y1="328" x2="222" y2="272" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  <line x1="144" y1="184" x2="200" y2="200" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  <!-- CAMAS wordmark -->
  <text x="256" y="416" font-family="system-ui,-apple-system,Inter,Helvetica,Arial,sans-serif"
        font-weight="900" font-size="64" letter-spacing="6"
        fill="#ffffff" text-anchor="middle">CAMAS</text>
</svg>
